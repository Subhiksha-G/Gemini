<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhiksha | Portfolio</title>
    <link rel="stylesheet" href="/home-styles.css">
    <link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body>
    <nav class="navBar">
        <div class="logo">SUBHIKSHA G</div>
        <div class="nav-links">
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>
    <header class="hero">
        <h1> Hi, I'm Subhiksha G</h1>
        <p>Frontend Developer & UI Designer</p>
    </header>
    <section class="project-section">
        <h2>My Projects</h2>
        <div class="project-grid">
            <div class="project-card">
                <h3>Team Directory App</h3>
                <p>A real-time user directory fetching data from a live API with search and dark mode functionality.</p>
                <a href="/index.html" class="view-btn">View Project</a>
            </div>
        </div>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contact-form" onsubmit="handleContact(event)">
            <input type="text" id="name" placeholder="Your name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="view-btn">Send Message</button>
        </form>
        <div id="form-feedback" style="display: none; margin-top: 20px; color: green; font-weight: bold;">
            Thanks for reaching out! I'll get back to you soon. 
        </div>
    </section>
</body>
<script src="/home-script.js"></script>
</html>
